<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Hospital System - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>🏥 Hospital System</h1>

    <div id="alert" class="alert"></div>

    <div class="tabs">
        <button type="button" class="tab active" onclick="switchTab(event, 'login')">Login</button>
        <button type="button" class="tab" onclick="switchTab(event, 'register')">Registrar</button>
    </div>

    <form id="login" class="tab-content active" onsubmit="handleLogin(event)">
        <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" required>
        </div>
        <div class="form-group">
            <label for="login-password">Senha</label>
            <input type="password" id="login-password" required>
        </div>
        <button type="submit" id="btn-login">Entrar</button>
    </form>

    <form id="register" class="tab-content" onsubmit="handleRegister(event)">
        <div class="form-group">
            <label for="reg-name">Nome</label>
            <input type="text" id="reg-name" required>
        </div>
        <div class="form-group">
            <label for="reg-lastname">Sobrenome</label>
            <input type="text" id="reg-lastname" required>
        </div>
        <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" required>
        </div>
        <div class="form-group">
            <label for="reg-password">Senha</label>
            <input type="password" id="reg-password" required minlength="6">
        </div>
        <button type="submit" id="btn-register">Registrar</button>
    </form>
</div>

<script src="api.js"></script>
<script>
    if (getToken()) {
        window.location.href = 'dashboard.html';
    }

    function switchTab(event, tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));

        if (event && event.target) {
            event.target.classList.add('active');
        } else {
            document.querySelector(`.tab[onclick*="${tab}"]`).classList.add('active');
        }

        document.getElementById(tab).classList.add('active');
    }

    async function handleLogin(event) {
        event.preventDefault();

        const btn = document.getElementById('btn-login');
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        btn.disabled = true;
        btn.textContent = 'Carregando...';

        try {
            const result = await authenticate(email, password);
            setToken(result.token);
            showAlert('success', 'Login realizado!');
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 800);
        } catch (err) {
            showAlert('error', 'Email ou senha inválidos.');
            btn.disabled = false;
            btn.textContent = 'Entrar';
        }
    }

    async function handleRegister(event) {
        event.preventDefault();

        const btn = document.getElementById('btn-register');
        const name = document.getElementById('reg-name').value;
        const lastname = document.getElementById('reg-lastname').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;

        btn.disabled = true;
        btn.textContent = 'Carregando...';

        try {
            await register(name, lastname, email, password);
            showAlert('success', 'Cadastro realizado! Faça login agora.');

            document.getElementById('register').reset();

            switchTab(null, 'login');
        } catch (err) {
            showAlert('error', err.message || 'Erro ao registrar.');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Registrar';
        }
    }
</script>
</body>
</html>
