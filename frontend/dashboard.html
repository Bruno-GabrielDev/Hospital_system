<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Hospital System - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="dashboard-container">
    <div class="header">
        <h1>🏥 Hospital System</h1>
        <button class="logout-btn" onclick="removeToken()">Sair</button>
    </div>

    <div id="alert" class="alert"></div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('patients')">Pacientes</button>
        <button class="tab" onclick="switchTab('doctors')">Médicos</button>
        <button class="tab" onclick="switchTab('procedures')">Procedimentos</button>
        <button class="tab" onclick="switchTab('appointments')">Atendimentos</button>
    </div>

    <!-- PACIENTES -->
    <div id="patients" class="tab-content active">
        <h2>Cadastrar Paciente</h2>
        <div class="form-group">
            <label>Nome</label>
            <input type="text" id="patient-name">
        </div>
        <div class="form-group">
            <label>Documento (CPF)</label>
            <input type="text" id="patient-document">
        </div>
        <div class="form-group">
            <label>Tipo de Seguro</label>
            <select id="patient-insurance">
                <option value="NONE">Particular (NONE)</option>
                <option value="BASIC">Básico (BASIC)</option>
                <option value="PREMIUM">Premium (PREMIUM)</option>
            </select>
        </div>
        <button onclick="handleCreatePatient()">Cadastrar</button>

        <h2>Lista de Pacientes</h2>
        <button class="secondary" onclick="loadPatients()">Atualizar Lista</button>
        <table>
            <thead>
            <tr>
                <th>ID</th><th>Nome</th><th>Documento</th><th>Seguro</th>
            </tr>
            </thead>
            <tbody id="patients-list"></tbody>
        </table>
    </div>

    <!-- MÉDICOS -->
    <div id="doctors" class="tab-content">
        <h2>Cadastrar Médico</h2>
        <div class="form-group">
            <label>Nome</label>
            <input type="text" id="doctor-name">
        </div>
        <div class="form-group">
            <label>Especialidade</label>
            <input type="text" id="doctor-specialty">
        </div>
        <div class="form-group">
            <label>CRM</label>
            <input type="text" id="doctor-license">
        </div>
        <button onclick="handleCreateDoctor()">Cadastrar</button>

        <h2>Lista de Médicos</h2>
        <button class="secondary" onclick="loadDoctors()">Atualizar Lista</button>
        <table>
            <thead>
            <tr>
                <th>ID</th><th>Nome</th><th>Especialidade</th><th>CRM</th>
            </tr>
            </thead>
            <tbody id="doctors-list"></tbody>
        </table>
    </div>

    <!-- PROCEDIMENTOS -->
    <div id="procedures" class="tab-content">
        <h2>Cadastrar Procedimento</h2>
        <div class="form-group">
            <label>Nome</label>
            <input type="text" id="procedure-name">
        </div>
        <div class="form-group">
            <label>Custo</label>
            <input type="number" step="0.01" id="procedure-cost">
        </div>
        <button onclick="handleCreateProcedure()">Cadastrar</button>

        <h2>Lista de Procedimentos</h2>
        <button class="secondary" onclick="loadProcedures()">Atualizar Lista</button>
        <table>
            <thead>
            <tr>
                <th>ID</th><th>Nome</th><th>Custo</th>
            </tr>
            </thead>
            <tbody id="procedures-list"></tbody>
        </table>
    </div>

    <!-- ATENDIMENTOS -->
    <div id="appointments" class="tab-content">
        <h2>Criar Atendimento</h2>
        <div class="form-group">
            <label>Paciente</label>
            <select id="appt-patient"></select>
        </div>
        <div class="form-group">
            <label>Médico</label>
            <select id="appt-doctor"></select>
        </div>
        <div class="form-group">
            <label>Data e Hora</label>
            <input type="datetime-local" id="appt-date">
        </div>
        <button onclick="handleCreateAppointment()">Criar Atendimento</button>

        <h2>Lista de Atendimentos</h2>
        <button class="secondary" onclick="loadAppointments()">Atualizar Lista</button>
        <table>
            <thead>
            <tr>
                <th>ID</th><th>Paciente</th><th>Médico</th><th>Data</th><th>Status</th><th>Ações</th>
            </tr>
            </thead>
            <tbody id="appointments-list"></tbody>
        </table>
    </div>
</div>

<script src="api.js"></script>
<script>
    // Verifica se está logado
    if (!getToken()) {
        window.location.href = 'index.html';
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById(tab).classList.add('active');
    }

    // === PACIENTES ===
    async function handleCreatePatient() {
        const name = document.getElementById('patient-name').value;
        const doc = document.getElementById('patient-document').value;
        const insurance = document.getElementById('patient-insurance').value;
        try {
            await createPatient(name, doc, insurance);
            showAlert('success', 'Paciente cadastrado!');
            loadPatients();
        } catch (err) {
            showAlert('error', err.message); 
        }
    }

    async function loadPatients() {
        try {
            const list = await listPatients();
            const tbody = document.getElementById('patients-list');
            tbody.innerHTML = list.map(p => `
                    <tr>
                        <td>${p.id.substring(0, 8)}...</td>
                        <td>${p.name}</td>
                        <td>${p.document}</td>
                        <td>${p.insuranceType}</td>
                    </tr>
                `).join('');
        } catch (err) {
            showAlert('error', err.message);
        }
    }

    // === MÉDICOS ===
    async function handleCreateDoctor() {
        const name = document.getElementById('doctor-name').value;
        const spec = document.getElementById('doctor-specialty').value;
        const lic = document.getElementById('doctor-license').value;
        try {
            await createDoctor(name, spec, lic);
            showAlert('success', 'Médico cadastrado!');
            loadDoctors();
        } catch (err) {
            showAlert('error', err.message);
        }
    }

    async function loadDoctors() {
        try {
            const list = await listDoctors();
            const tbody = document.getElementById('doctors-list');
            tbody.innerHTML = list.map(d => `
                    <tr>
                        <td>${d.id.substring(0, 8)}...</td>
                        <td>${d.name}</td>
                        <td>${d.specialty}</td>
                        <td>${d.license}</td>
                    </tr>
                `).join('');
        } catch (err) {
            showAlert('error', err.message);
        }
    }

    // === PROCEDIMENTOS ===
    async function handleCreateProcedure() {
        const name = document.getElementById('procedure-name').value;
        const cost = parseFloat(document.getElementById('procedure-cost').value);
        try {
            await createProcedure(name, cost);
            showAlert('success', 'Procedimento cadastrado!');
            loadProcedures();
        } catch (err) {
            showAlert('error', err.message);
        }
    }

    async function loadProcedures() {
        try {
            const list = await listProcedures();
            const tbody = document.getElementById('procedures-list');
            tbody.innerHTML = list.map(p => `
                    <tr>
                        <td>${p.id.substring(0, 8)}...</td>
                        <td>${p.name}</td>
                        <td>R$ ${p.cost.toFixed(2)}</td>
                    </tr>
                `).join('');
        } catch (err) {
            showAlert('error', err.message);
        }
    }

    // === ATENDIMENTOS ===
    async function handleCreateAppointment() {
        const patientId = document.getElementById('appt-patient').value;
        const doctorId = document.getElementById('appt-doctor').value;
        const scheduledAt = document.getElementById('appt-date').value;

        if (!patientId || !doctorId || !scheduledAt) {
            showAlert('error', 'Preencha todos os campos.');
            return;
        }

        try {
            await createAppointment(patientId, doctorId, scheduledAt);
            showAlert('success', 'Atendimento criado!');
            loadAppointments();
        } catch (err) {
            showAlert('error', err.message);
        }
    }

    async function loadAppointments() {
        try {
            const list = await listAppointments();
            const tbody = document.getElementById('appointments-list');
            tbody.innerHTML = list.map(a => `
                    <tr>
                        <td>${a.id.substring(0, 8)}...</td>
                        <td>${a.patient.name}</td>
                        <td>${a.doctor.name}</td>
                        <td>${new Date(a.scheduledAt).toLocaleString('pt-BR')}</td>
                        <td>${a.status}</td>
                        <td>
                            <button class="secondary" style="width:auto;padding:5px 10px;font-size:12px;"
                                onclick="handleClose('${a.id}')">Fechar</button>
                            <button style="width:auto;padding:5px 10px;font-size:12px;margin-top:5px;"
                                onclick="handleBill('${a.id}')">Faturar</button>
                            <button class="danger" style="width:auto;padding:5px 10px;font-size:12px;margin-top:5px;"
                                onclick="handleCancel('${a.id}')">Cancelar</button>
                        </td>
                    </tr>
                `).join('');
        } catch (err) {
            showAlert('error', err.message);
        }
    }

    async function handleClose(id) {
        try {
            await closeAppointment(id);
            showAlert('success', 'Atendimento fechado!');
            loadAppointments();
        } catch (err) {
            showAlert('error', err.message);
        }
    }

    async function handleBill(id) {
        try {
            await billAppointment(id);
            showAlert('success', 'Atendimento faturado!');
            loadAppointments();
        } catch (err) {
            showAlert('error', err.message);
        }
    }

    async function handleCancel(id) {
        const reason = prompt('Motivo do cancelamento:');
        if (!reason) return;
        try {
            await cancelAppointment(id, reason);
            showAlert('success', 'Atendimento cancelado!');
            loadAppointments();
        } catch (err) {
            showAlert('error', err.message);
        }
    }

    // Carrega dados iniciais e popula selects
    async function init() {
        await loadPatients();
        await loadDoctors();
        await loadProcedures();
        await loadAppointments();

        // Popula selects do form de atendimento
        try {
            const patients = await listPatients();
            const doctors = await listDoctors();
            document.getElementById('appt-patient').innerHTML =
                '<option value="">Selecione...</option>' +
                patients.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            document.getElementById('appt-doctor').innerHTML =
                '<option value="">Selecione...</option>' +
                doctors.map(d => `<option value="${d.id}">${d.name}</option>`).join('');
        } catch (err) {}
    }

    init();
</script>
</body>
</html>
